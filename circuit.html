<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PN-LS-002 Rev D — Circuit Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root {
  --bg:#0a0d12;--bg2:#10141c;--bg3:#171d28;--bg4:#1f2735;
  --fg:#dfe4ec;--fg2:#8892a4;--fg3:#505968;
  --accent:#e8984a;--accent2:#f0b06e;
  --red:#ef5350;--green:#66bb6a;--blue:#42a5f5;--yellow:#ffca28;--cyan:#26c6da;
  --wire-off:#2a3040;--wire-hot:#ef5350;--wire-gnd:#444e60;
  --coil-off:#1a2030;--coil-on:#3a2000;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
.header{background:var(--bg2);border-bottom:1px solid var(--bg4);padding:.7rem 1.2rem;display:flex;align-items:center;gap:.7rem}
.header h1{font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;color:var(--accent);letter-spacing:.03em}
.header .sub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--fg3)}
.badge{background:var(--accent);color:var(--bg);padding:.1rem .4rem;border-radius:4px;font-weight:700;font-size:.65rem;font-family:'IBM Plex Mono',monospace;margin-left:.4rem}
.main{display:flex;flex-direction:column;height:calc(100vh - 52px)}
.schematic-wrap{flex:1;overflow:auto;background:var(--bg);position:relative;min-height:500px}
.schematic-wrap svg{width:100%;height:100%;min-height:500px}
.controls-bar{background:var(--bg2);border-top:1px solid var(--bg4);padding:.6rem 1rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.ctrl-btn{font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;padding:.5rem .8rem;border-radius:6px;border:1px solid var(--bg4);background:var(--bg3);color:var(--fg);cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .15s;min-width:72px;text-align:center}
.ctrl-btn:active{transform:scale(.96)}
.ctrl-btn.active-fwd{background:#2a1a1a;border-color:var(--red);color:var(--red)}
.ctrl-btn.active-bwd{background:#1a2a1a;border-color:var(--green);color:var(--green)}
.ctrl-btn.active-cycle{background:#2a2a1a;border-color:var(--yellow);color:var(--yellow)}
.ctrl-btn.active-estop{background:#3a1a1a;border-color:var(--red);color:var(--red)}
.ctrl-sep{width:1px;height:28px;background:var(--bg4);margin:0 .3rem}
.status-pill{font-family:'IBM Plex Mono',monospace;font-size:.68rem;padding:.35rem .7rem;border-radius:20px;background:var(--bg3);border:1px solid var(--bg4);color:var(--fg2);margin-left:auto;white-space:nowrap}
.status-pill .st{color:var(--accent);font-weight:700}
.info-bar{background:var(--bg2);border-top:1px solid var(--bg4);padding:.4rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--fg3);display:flex;gap:1.5rem;flex-wrap:wrap}
.info-bar .hot{color:var(--red)}
.info-bar .off{color:var(--fg3)}
.info-bar span{display:flex;align-items:center;gap:.3rem}
.info-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.info-bar .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.info-bar .dot.off{background:var(--fg3);opacity:.4}

/* SVG styles */
.wire{stroke:var(--wire-off);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .3s,filter .3s}
.wire.hot{stroke:var(--wire-hot);filter:drop-shadow(0 0 3px rgba(239,83,80,.5))}
.wire.gnd{stroke:var(--wire-gnd);stroke-width:2.5}
.wire.gnd.hot{stroke:var(--blue);filter:drop-shadow(0 0 3px rgba(66,165,245,.4))}
.comp-body{fill:var(--bg3);stroke:var(--bg4);stroke-width:1.5;rx:4}
.comp-body.energized{fill:var(--coil-on);stroke:var(--accent)}
.comp-label{font-family:'IBM Plex Mono',monospace;font-size:10px;fill:var(--fg2);font-weight:600;text-anchor:middle}
.comp-sublabel{font-family:'IBM Plex Mono',monospace;font-size:7px;fill:var(--fg3);text-anchor:middle}
.node-dot{r:4;fill:var(--wire-off);transition:fill .3s}
.node-dot.hot{fill:var(--wire-hot);filter:url(#glow)}
.switch-contact{stroke:var(--fg3);stroke-width:2;fill:none;stroke-linecap:round;transition:all .3s}
.switch-contact.closed{stroke:var(--green)}
.switch-contact.open{stroke:var(--red)}
.relay-indicator{fill:var(--fg3);opacity:.3;transition:all .3s}
.relay-indicator.on{fill:var(--green);opacity:1;filter:url(#glow)}
.solenoid-body{fill:var(--bg3);stroke:var(--bg4);stroke-width:1.5}
.solenoid-body.firing{fill:#1a2a1a;stroke:var(--green)}

/* Cylinder at bottom of schematic */
.cyl-track{fill:var(--bg4);rx:4}
.cyl-rod{fill:var(--accent);rx:3;transition:width .1s linear}

/* Responsive */
@media(max-width:600px){
  .controls-bar{padding:.4rem .6rem;gap:.3rem}
  .ctrl-btn{font-size:.62rem;padding:.4rem .5rem;min-width:56px}
  .status-pill{font-size:.6rem;padding:.25rem .5rem}
}
</style>
</head>
<body>
<div class="header">
  <h1>PN-LS-002 <span class="badge">REV D</span> CIRCUIT VISUALIZER</h1>
  <div class="sub">Phoenix Nest LLC — Interactive Relay Logic</div>

<div class="main">
  <div class="schematic-wrap">
    <svg id="schematic" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- ===== POWER BUS ===== -->

      <text x="50" y="49" class="comp-label">12V</text>
      <text x="50" y="20" class="comp-sublabel">BATTERY</text>

      <!-- Fuse -->

      <text x="152" y="49" class="comp-label">FUSE</text>

      <!-- W02: Fuse to E-Stop -->

      <!-- E-Stop -->
      <rect x="220" y="33" width="56" height="24" class="comp-body" id="estop-body"/>

      <!-- Bus A rail (horizontal) -->

      <rect x="440" y="140" width="40" height="24" class="comp-body solenoid-body" id="solb-jog-body"/>
      <text x="460" y="156" class="comp-label" style="font-size:8px">SOL-B</text>

      <!-- ===== K1 DIRECT PATH (CYCLE btn) ===== -->
      <path d="M540 45 V80" class="wire" id="w10"/>
      <rect x="520" y="80" width="40" height="24" class="comp-body" id="cycle-body"/>
      <text x="540" y="96" class="comp-label" style="font-size:8px">CYCLE</text>
      <text x="540" y="74" class="comp-sublabel">NO</text>
      <path d="M540 104 V160" class="wire" id="w11"/>
      <!-- K1 Coil -->
      <rect x="520" y="160" width="40" height="30" class="comp-body" id="k1-coil"/>
      <text x="540" y="179" class="comp-label">K1</text>
      <text x="540" y="200" class="comp-sublabel">COIL</text>
      <circle cx="562" cy="165" r="4" class="relay-indicator" id="k1-led"/>
      <path d="M540 190 V490" class="wire gnd" id="w16"/>

      <!-- ===== K1 SEAL PATH ===== -->
      <path d="M620 45 V80" class="wire" id="w12"/>
      <!-- K1 P1 NO (seal contact) -->
      <rect x="600" y="80" width="40" height="24" class="comp-body" id="k1p1-body"/>
      <text x="620" y="96" class="comp-label" style="font-size:7px">K1 P1</text>
      <text x="620" y="74" class="comp-sublabel">NO (seal)</text>
      <path d="M620 104 V130" class="wire" id="w13"/>
      <!-- FWD NC -->
      <rect x="600" y="130" width="40" height="20" class="comp-body" id="fwd-nc-body"/>
      <text x="620" y="144" class="comp-label" style="font-size:7px">FWD NC</text>
      <path d="M620 150 V170" class="wire" id="w31"/>
      <!-- BWD NC -->
      <rect x="600" y="170" width="40" height="20" class="comp-body" id="bwd-nc-body"/>
      <text x="620" y="184" class="comp-label" style="font-size:7px">BWD NC</text>
      <path d="M620 190 V210" class="wire" id="w32"/>
      <!-- Ret Lim NC -->
      <rect x="600" y="210" width="40" height="20" class="comp-body" id="retlim-nc-body"/>
      <text x="620" y="224" class="comp-label" style="font-size:7px">RET NC</text>
      <!-- W14 to K1 coil -->
      <path d="M620 230 V175 H560" class="wire" id="w14"/>

      <!-- ===== NODE X ===== -->
      <path d="M700 45 V80" class="wire" id="w17"/>
      <rect x="680" y="80" width="40" height="24" class="comp-body" id="k1p2-body"/>
      <text x="700" y="96" class="comp-label" style="font-size:7px">K1 P2</text>
      <text x="700" y="74" class="comp-sublabel">NO</text>
      <path d="M700 104 V120" class="wire" id="w18"/>
      <circle cx="700" cy="120" class="node-dot" id="nodeX-dot"/>
      <text x="700" y="114" class="comp-sublabel" style="fill:var(--accent);font-size:8px">NODE X</text>
      <!-- Node X distributes to K3, K2 output, and extend limit -->
      <path d="M700 120 H700 V140" class="wire" id="nx-down"/>

      <!-- ===== K3 COIL (via extend limit) ===== -->
      <path d="M700 140 H760 V180" class="wire" id="w22"/>
      <rect x="740" y="180" width="40" height="20" class="comp-body" id="extlim-body"/>
      <text x="760" y="194" class="comp-label" style="font-size:7px">EXT NO</text>
      <path d="M760 200 V230" class="wire" id="w23"/>
      <rect x="740" y="230" width="40" height="30" class="comp-body" id="k3-coil"/>
      <text x="760" y="249" class="comp-label">K3</text>
      <text x="760" y="268" class="comp-sublabel">COIL</text>
      <circle cx="782" cy="235" r="4" class="relay-indicator" id="k3-led"/>
      <path d="M760 260 V490" class="wire gnd" id="w25"/>
      <!-- K3 Seal (P2 NO) -->
      <rect x="790" y="200" width="36" height="18" class="comp-body" id="k3p2-body"/>
      <text x="808" y="213" class="comp-label" style="font-size:6px">K3 SEAL</text>
      <path d="M808 218 V245 H780" class="wire" id="w24"/>
      <path d="M808 200 V140 H760" class="wire" id="w24-feed"/>

      <!-- ===== K2 COIL (via K3 NC lock) ===== -->
      <path d="M700 140 V180" class="wire" id="w19-down"/>
      <rect x="680" y="180" width="40" height="20" class="comp-body" id="k3p1nc-body"/>
      <text x="700" y="194" class="comp-label" style="font-size:7px">K3 NC</text>
      <text x="700" y="175" class="comp-sublabel">LOCK</text>
      <path d="M700 200 V230" class="wire" id="w20"/>
      <rect x="680" y="230" width="40" height="30" class="comp-body" id="k2-coil"/>
      <text x="700" y="249" class="comp-label">K2</text>
      <text x="700" y="268" class="comp-sublabel">COIL</text>
      <circle cx="722" cy="235" r="4" class="relay-indicator" id="k2-led"/>
      <path d="M700 260 V490" class="wire gnd" id="w21"/>

      <!-- ===== K2 OUTPUTS (from Node X) ===== -->
      <path d="M700 120 H840 V300" class="wire" id="w26"/>
      <text x="845" y="295" class="comp-sublabel" style="text-anchor:start">K2 COM</text>
      <!-- K2 P1 NO -> SOL-A -->
      <rect x="820" y="310" width="40" height="24" class="comp-body" id="k2-no-body"/>
      <text x="840" y="326" class="comp-label" style="font-size:7px">K2 NO</text>
      <path d="M840 334 V370" class="wire" id="w27"/>
      <rect x="820" y="370" width="40" height="24" class="comp-body solenoid-body" id="sola-auto-body"/>
      <text x="840" y="386" class="comp-label" style="font-size:8px">SOL-A</text>
      <text x="840" y="400" class="comp-sublabel">EXTEND</text>
      <path d="M840 394 V490" class="wire gnd" id="w27-gnd"/>
      <!-- K2 P1 NC -> SOL-B -->
      <rect x="820" y="410" width="40" height="24" class="comp-body" id="k2-nc-body"/>
      <text x="840" y="426" class="comp-label" style="font-size:7px">K2 NC</text>
      <path d="M840 434 V455" class="wire" id="w28"/>
      <rect x="820" y="455" width="40" height="24" class="comp-body solenoid-body" id="solb-auto-body"/>
      <text x="840" y="471" class="comp-label" style="font-size:8px">SOL-B</text>
      <text x="840" y="487" class="comp-sublabel">RETRACT</text>
      <path d="M840 479 V490" class="wire gnd" id="w28-gnd"/>
      <!-- K2 COM splits to NO and NC -->
      <path d="M840 300 V310" class="wire" id="k2-to-no"/>
      <path d="M840 334 V410" class="wire" id="k2-no-to-nc"/>

      <!-- ===== CYLINDER POSITION ===== -->
      <rect x="100" y="440" width="280" height="20" class="cyl-track"/>
      <rect x="102" y="442" width="28" height="16" class="cyl-rod" id="cyl-rod"/>
      <text x="100" y="436" class="comp-sublabel" style="text-anchor:start;font-size:8px">HOME</text>
      <text x="380" y="436" class="comp-sublabel" style="text-anchor:end;font-size:8px">EXTEND</text>
      <text x="240" y="436" class="comp-sublabel" style="font-size:7px">CYLINDER POSITION</text>
    </svg>
  </div>

  <div class="controls-bar">
    <button class="ctrl-btn" id="btn-fwd">▶ FWD</button>
    <button class="ctrl-btn" id="btn-bwd">◀ BWD</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-cycle">⟳ CYCLE</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-estop">⛔ E-STOP</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-extlim" style="font-size:.6rem">EXT LIM</button>
    <button class="ctrl-btn" id="btn-retlim" style="font-size:.6rem">RET LIM</button>
    <div class="status-pill" id="status"><span class="st">IDLE</span> — Ready</div>
  </div>

  <div class="info-bar" id="info-bar">
    <span><span class="dot off" id="d-k1"></span>K1</span>
    <span><span class="dot off" id="d-k2"></span>K2</span>
    <span><span class="dot off" id="d-k3"></span>K3</span>
    <span><span class="dot off" id="d-nx"></span>Node X</span>
    <span><span class="dot off" id="d-sola"></span>SOL-A</span>
    <span><span class="dot off" id="d-solb"></span>SOL-B</span>
    <span id="pos-text">POS: 0%</span>
  </div>
</div>

<script>
const SIM_SPEED = 40;
const S = {
  pos:0, k1:false, k2:false, k3:false, nodeX:false,
  solA:false, solB:false, extLim:false, retLim:true,
  estop:false, jogging:null, cycling:false, cycleHeld:false,
  phase:'idle', af:null, lt:0
};

function updateLimits(){ S.extLim=(S.pos>=98); S.retLim=(S.pos<=2); }

function evaluate(){
  if(S.estop){
    S.k1=S.k2=S.k3=S.nodeX=S.solA=S.solB=false;
    S.cycling=false; S.jogging=null; S.phase='estop'; return;
  }
  var fNC=(S.jogging!=='fwd'), bNC=(S.jogging!=='bwd'), rNC=!S.retLim;
  var seal=S.k1&&fNC&&bNC&&rNC;
  S.k1=S.cycleHeld||seal;
  S.nodeX=S.k1;
  if(S.nodeX&&S.extLim&&!S.k3) S.k3=true;
  if(!S.nodeX) S.k3=false;
  S.k2=S.nodeX&&!S.k3;
  var ae=S.k1&&S.nodeX&&S.k2, ar=S.k1&&S.nodeX&&!S.k2&&S.k3;
  var jA=(S.jogging==='fwd'), jB=(S.jogging==='bwd');
  S.solA=ae||jA; S.solB=ar||jB;
  if(S.k1&&S.k2&&!S.k3){S.phase='extending';S.cycling=true;}
  else if(S.k1&&S.k3&&!S.k2){S.phase='retracting';}
  else if(!S.k1&&!S.k2&&!S.k3){
    S.cycling=false;
    S.phase=S.jogging?(S.jogging==='fwd'?'jog_fwd':'jog_bwd'):'idle';
  }
}

function jog(d,p){
  if(S.estop)return;
  if(p){S.jogging=d;startLoop();}else{if(S.jogging===d)S.jogging=null;}
  evaluate();render();
}
function cycle(p){
  if(S.estop)return;
  S.cycleHeld=p;
  if(p&&!S.cycling)startLoop();
  evaluate();render();
}
function estop(){
  S.estop=true;S.cycleHeld=false;evaluate();render();
  setTimeout(function(){S.estop=false;S.phase='idle';updateLimits();evaluate();render();},2000);
}

function startLoop(){if(S.af)return;S.lt=performance.now();S.af=requestAnimationFrame(tick);}
function tick(n){
  var dt=(n-S.lt)/1000;S.lt=n;
  if(S.estop){S.af=null;return;}
  var m=false;
  if(S.solA&&S.pos<100){S.pos=Math.min(100,S.pos+SIM_SPEED*dt);m=true;}
  if(S.solB&&S.pos>0){S.pos=Math.max(0,S.pos-SIM_SPEED*dt);m=true;}
  updateLimits();evaluate();render();
  if(m||S.cycling||S.jogging)S.af=requestAnimationFrame(tick);else S.af=null;
}

function $(id){return document.getElementById(id);}
function hot(id,on){var e=$(id);if(e)e.classList.toggle('hot',on);}
function cls(id,c,on){var e=$(id);if(e)e.classList.toggle(c,on);}

function render(){
  var busHot=!S.estop;
  hot('w01',busHot);hot('w02',busHot);hot('w03',busHot);hot('busA',busHot);

  // FWD jog path
  var fwdJog=(S.jogging==='fwd')&&busHot;
  hot('w04a',busHot);hot('w05a',fwdJog);hot('w06a',fwdJog);
  cls('fwd-no-body','energized',fwdJog);
  cls('sola-jog-body','firing',fwdJog);

  // BWD jog path
  var bwdJog=(S.jogging==='bwd')&&busHot;
  hot('w07a',busHot);hot('w08a',bwdJog);hot('w09a',bwdJog);
  cls('bwd-no-body','energized',bwdJog);
  cls('solb-jog-body','firing',bwdJog);

  // K1 direct path
  var cyclePressed=S.cycleHeld&&busHot;
  hot('w10',busHot);hot('w11',cyclePressed);
  cls('cycle-body','energized',cyclePressed);

  // K1 coil
  var k1hot=S.k1&&busHot;
  cls('k1-coil','energized',k1hot);
  cls('k1-led','on',k1hot);
  hot('w16',k1hot);

  // K1 seal path
  var sealHot=S.k1&&busHot&&!S.cycleHeld;
  hot('w12',busHot);
  hot('w13',S.k1&&busHot);
  cls('k1p1-body','energized',S.k1);
  var fwdNCclosed=(S.jogging!=='fwd');
  var bwdNCclosed=(S.jogging!=='bwd');
  var retNCclosed=!S.retLim;
  hot('w31',S.k1&&fwdNCclosed&&busHot);
  hot('w32',S.k1&&fwdNCclosed&&bwdNCclosed&&busHot);
  hot('w14',S.k1&&fwdNCclosed&&bwdNCclosed&&retNCclosed&&busHot);
  cls('fwd-nc-body','energized',!fwdNCclosed);
  cls('bwd-nc-body','energized',!bwdNCclosed);
  cls('retlim-nc-body','energized',!retNCclosed);

  // Node X
  var nxHot=S.nodeX&&busHot;
  hot('w17',busHot);hot('w18',nxHot);
  cls('k1p2-body','energized',S.k1);
  cls('nodeX-dot','hot',nxHot);
  hot('nx-down',nxHot);

  // K3 path
  hot('w22',nxHot);
  cls('extlim-body','energized',S.extLim);
  hot('w23',nxHot&&S.extLim);
  cls('k3-coil','energized',S.k3);
  cls('k3-led','on',S.k3);
  hot('w25',S.k3&&busHot);
  // K3 seal
  cls('k3p2-body','energized',S.k3);
  hot('w24',S.k3&&nxHot);
  hot('w24-feed',nxHot);

  // K2 path (through K3 NC)
  hot('w19-down',nxHot);
  cls('k3p1nc-body','energized',S.k3);
  hot('w20',nxHot&&!S.k3);
  cls('k2-coil','energized',S.k2);
  cls('k2-led','on',S.k2);
  hot('w21',S.k2&&busHot);

  // K2 outputs
  hot('w26',nxHot);
  hot('k2-to-no',nxHot);
  var solAauto=S.k2&&nxHot;
  var solBauto=!S.k2&&S.k3&&nxHot;
  cls('k2-no-body','energized',S.k2);
  cls('k2-nc-body','energized',!S.k2&&S.k3);
  hot('w27',solAauto);
  cls('sola-auto-body','firing',solAauto);
  hot('w27-gnd',solAauto);
  hot('k2-no-to-nc',nxHot&&!S.k2);
  hot('w28',solBauto);
  cls('solb-auto-body','firing',solBauto);
  hot('w28-gnd',solBauto);

  // Cylinder
  var rod=$('cyl-rod');
  if(rod) rod.setAttribute('width',Math.max(28,S.pos*2.76));

  // Buttons
  $('btn-fwd').className='ctrl-btn'+(S.jogging==='fwd'?' active-fwd':'');
  $('btn-bwd').className='ctrl-btn'+(S.jogging==='bwd'?' active-bwd':'');
  $('btn-cycle').className='ctrl-btn'+(S.cycling?' active-cycle':'');
  $('btn-estop').className='ctrl-btn'+(S.estop?' active-estop':'');
  cls('btn-extlim','active-fwd',S.extLim);
  cls('btn-retlim','active-bwd',S.retLim);

  // Status
  var sm={idle:'<span class="st">IDLE</span> — Ready',extending:'<span class="st">EXTENDING</span> — K1+K2, SOL-A',retracting:'<span class="st">RETRACTING</span> — K1+K3, SOL-B',jog_fwd:'<span class="st">JOG FWD</span> — Manual',jog_bwd:'<span class="st">JOG BWD</span> — Manual',estop:'<span class="st" style="color:var(--red)">E-STOP</span>'};
  $('status').innerHTML=sm[S.phase]||'';

  // Info dots
  function setDot(id,on){$(id).className='dot '+(on?'on':'off');}
  setDot('d-k1',S.k1);setDot('d-k2',S.k2);setDot('d-k3',S.k3);
  setDot('d-nx',S.nodeX);setDot('d-sola',S.solA);setDot('d-solb',S.solB);
  $('pos-text').textContent='POS: '+Math.round(S.pos)+'%';
}

// Init
document.addEventListener('DOMContentLoaded',function(){
  updateLimits();render();
  var f=$('btn-fwd'),b=$('btn-bwd'),c=$('btn-cycle');
  f.onmousedown=function(){jog('fwd',true);};f.onmouseup=f.onmouseleave=function(){jog('fwd',false);};
  f.ontouchstart=function(e){e.preventDefault();jog('fwd',true);};f.ontouchend=function(e){e.preventDefault();jog('fwd',false);};
  b.onmousedown=function(){jog('bwd',true);};b.onmouseup=b.onmouseleave=function(){jog('bwd',false);};
  b.ontouchstart=function(e){e.preventDefault();jog('bwd',true);};b.ontouchend=function(e){e.preventDefault();jog('bwd',false);};
  c.onmousedown=function(){cycle(true);};c.onmouseup=c.onmouseleave=function(){cycle(false);};
  c.ontouchstart=function(e){e.preventDefault();cycle(true);};c.ontouchend=function(e){e.preventDefault();cycle(false);};
  $('btn-estop').onclick=estop;
  $('btn-extlim').onclick=function(){S.extLim=!S.extLim;evaluate();render();};
  $('btn-retlim').onclick=function(){S.retLim=!S.retLim;evaluate();render();};
});
</script>
</body>
</html>
